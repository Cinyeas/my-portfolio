<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xinyi Kong — AI Product Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── Reset ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    /* ── Design Tokens ─────────────────────────────────────────
       Change accent color here to retheme the whole site.       */
    :root{
      --bg:#F2F6F3;--bg-card:#fff;--text:#0C1210;--text-mid:#4A5550;--text-light:#8A9990;
      --accent:#1AC97A;--accent-dim:rgba(26,201,122,.10);--accent-txt:#0A7A48;
      --border:#D4E4DA;--border-mid:#B8D0C0;
      --shadow-sm:0 2px 12px rgba(10,60,30,.07);--shadow-md:0 8px 32px rgba(10,60,30,.11);
      --ff-d:'Bricolage Grotesque',sans-serif;--ff-b:'DM Sans',system-ui,sans-serif;--ff-m:'Space Mono',monospace;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--ff-b);font-size:16px;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;cursor:none}
    a,button{cursor:none}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--accent)}

    /* ── Custom Cursor ── */
    .cur-dot{position:fixed;pointer-events:none;z-index:9999;width:8px;height:8px;background:var(--accent);border-radius:50%;transform:translate(-50%,-50%)}
    .cur-ring{position:fixed;pointer-events:none;z-index:9998;width:34px;height:34px;border:1.5px solid rgba(26,201,122,.5);border-radius:50%;transform:translate(-50%,-50%)}
    .noise{position:fixed;inset:0;pointer-events:none;z-index:1000;opacity:.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}

    /* ── Scroll Progress Bar ── */
    .progress-bar{position:fixed;top:0;left:0;z-index:201;height:2.5px;background:var(--accent);border-radius:0 2px 2px 0;transition:width .1s linear}

    /* nav */
    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:64px;padding:0 clamp(1.5rem,5vw,4.5rem);display:flex;align-items:center;justify-content:space-between;transition:background .32s,box-shadow .32s}
    nav.scrolled{background:rgba(242,246,243,.93);backdrop-filter:blur(18px) saturate(1.5);box-shadow:0 1px 0 var(--border)}
    .nav-logo{font-family:var(--ff-d);font-size:1rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--text);text-decoration:none;transition:color .2s}
    .nav-logo .dot{color:var(--accent)}
    .nav-logo:hover{color:var(--accent-txt)}
    .nav-links{display:flex;gap:0;list-style:none;align-items:center}
    .nav-links li{position:relative}
    .nav-links a{font-family:var(--ff-b);font-size:.85rem;font-weight:400;color:var(--text-mid);text-decoration:none;padding:.3rem .85rem;display:flex;align-items:center;gap:.35rem;border-radius:6px;position:relative;transition:color .22s,background .22s}
    .nav-links a:hover{color:var(--text);background:rgba(26,201,122,.1)}
    .nav-links a.active{color:var(--text);font-weight:500}
    .nav-links a.active::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
    .nav-links a::after{content:'';position:absolute;bottom:0;left:.85rem;right:.85rem;height:1.5px;background:var(--accent);border-radius:1px;transform:scaleX(0);transform-origin:left;transition:transform .22s ease}
    .nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1)}
    .nav-pill{font-family:var(--ff-m);font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--accent);color:#fff;padding:.5rem 1.2rem;text-decoration:none;margin-left:.75rem;border-radius:100px;transition:opacity .2s,transform .22s;box-shadow:0 2px 12px rgba(26,201,122,.3)}
    .nav-pill:hover{opacity:.88;transform:translateY(-2px)}

    /* ── Scroll Reveal Animation ── */
    .reveal{opacity:0;transform:translateY(24px);transition:opacity .78s ease,transform .78s ease}
    .reveal.visible{opacity:1;transform:translateY(0)}

    /* ── Hero Section ── */
    #hero{min-height:100vh;display:grid;grid-template-columns:1.05fr 1fr;align-items:center;gap:2rem;padding:5.5rem clamp(1.5rem,5vw,4.5rem) 3rem;position:relative;overflow:hidden}
    .hero-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(26,201,122,.065) 1px,transparent 1px),linear-gradient(90deg,rgba(26,201,122,.065) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse 80% 80% at 65% 50%,black 0%,transparent 70%)}
    .hero-glow{position:absolute;inset:0;background:radial-gradient(ellipse 55% 50% at 75% 45%,rgba(26,201,122,.09) 0%,transparent 60%),radial-gradient(ellipse 35% 35% at 15% 80%,rgba(26,201,122,.05) 0%,transparent 55%)}
    .hero-left{position:relative;z-index:2}
    .hero-eyebrow{font-family:var(--ff-m);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-txt);margin-bottom:1.5rem;display:flex;align-items:center;gap:.7rem;opacity:0;animation:riseUp .7s .1s ease forwards}
    .hero-eyebrow::before{content:'';width:28px;height:1.5px;background:var(--accent)}
    .hero-name{font-family:var(--ff-d);font-size:clamp(4rem,9vw,9.5rem);font-weight:800;line-height:.88;letter-spacing:-.035em;text-transform:uppercase;color:var(--text);margin-bottom:1.5rem;opacity:0;animation:riseUp .75s .22s ease forwards}
    .hero-name .acc{color:var(--accent)}.hero-name .dot{color:var(--accent)}
    .hero-tagline{font-family:var(--ff-b);font-size:clamp(.95rem,1.7vw,1.1rem);font-weight:300;color:var(--text-mid);max-width:460px;line-height:1.75;margin-bottom:2.5rem;opacity:0;animation:riseUp .7s .36s ease forwards}
    .hero-stats{display:flex;flex-wrap:nowrap;gap:0;margin-bottom:2.75rem;opacity:0;animation:riseUp .7s .5s ease forwards}
    .h-stat{flex-shrink:0;padding-right:1.75rem;margin-right:1.75rem;border-right:1px solid var(--border)}
    .h-stat:last-child{border-right:none;padding-right:0;margin-right:0}
    .h-stat-val{font-family:var(--ff-d);font-size:clamp(1.7rem,2.8vw,2.2rem);font-weight:700;letter-spacing:-.03em;line-height:1;color:var(--text);white-space:nowrap;display:block}
    .h-stat-lbl{font-family:var(--ff-m);font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);margin-top:.3rem;white-space:nowrap;display:block}
    .hero-btns{display:flex;gap:.9rem;flex-wrap:wrap;opacity:0;animation:riseUp .7s .64s ease forwards}
    .btn-solid{font-family:var(--ff-m);font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--text);color:#fff;padding:.9rem 2.1rem;text-decoration:none;border-radius:6px;display:inline-flex;align-items:center;gap:.5rem;transition:opacity .2s,transform .2s}
    .btn-solid:hover{opacity:.85;transform:translateY(-2px)}
    .btn-ghost{font-family:var(--ff-m);font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--text);border:1.5px solid var(--border-mid);padding:.9rem 2.1rem;text-decoration:none;border-radius:6px;display:inline-flex;align-items:center;gap:.5rem;transition:border-color .2s,color .2s,transform .2s}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent-txt);transform:translateY(-2px)}

    /* ── Floating Keyword Bubbles ── */
    .hero-right{position:relative;height:82vh;min-height:480px;z-index:2;opacity:0;animation:fadeIn .9s .38s ease forwards}
    .kw{position:absolute;white-space:nowrap;border-radius:100px;user-select:none;font-family:var(--ff-b);font-weight:500;transition:transform .2s,box-shadow .2s;box-shadow:var(--shadow-sm)}
    .kw:hover{transform:scale(1.07) translateY(-4px) !important;box-shadow:var(--shadow-md)}
    .kw-green{background:var(--accent);color:#fff;padding:.55rem 1.3rem;font-size:.9rem}
    .kw-dark{background:var(--text);color:#fff;padding:.5rem 1.2rem;font-size:.82rem}
    .kw-white{background:var(--bg-card);color:var(--text);border:1.5px solid var(--border);padding:.5rem 1.15rem;font-size:.82rem}
    .kw-mint{background:var(--accent-dim);color:var(--accent-txt);border:1.5px solid rgba(26,201,122,.25);padding:.48rem 1.1rem;font-size:.8rem}
    @keyframes f1{0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)}}
    @keyframes f2{0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-10px) rotate(.6deg)}}
    @keyframes f3{0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)}}
    @keyframes f4{0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-8px) rotate(-.5deg)}}
    @keyframes f5{0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-12px) rotate(.3deg)}}
    @keyframes f6{0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-16px) rotate(-.4deg)}}

    /* project preview strip */
    #preview{background:var(--bg-card);border-top:1px solid var(--border)}
    .preview-inner{max-width:1280px;margin:0 auto;padding:4rem clamp(1.5rem,5vw,4.5rem)}
    .preview-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2rem}
    .preview-label{font-family:var(--ff-m);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-light)}
    .preview-title{font-family:var(--ff-d);font-size:clamp(1.5rem,3vw,2.2rem);font-weight:700;letter-spacing:-.03em}
    .preview-title .acc{color:var(--accent)}
    .preview-rows{}
    .preview-row{display:grid;grid-template-columns:3rem 1fr auto auto;align-items:center;gap:1.5rem;padding:1.1rem 1rem;border-top:1px solid var(--border);border-radius:8px;transition:background .22s,transform .22s;cursor:none}
    .preview-row:hover{background:var(--accent-dim);transform:translateX(4px)}
    .preview-row:last-child{}
    .pre-num{font-family:var(--ff-m);font-size:.62rem;color:var(--text-light);letter-spacing:.08em}
    .pre-info{display:flex;align-items:baseline;gap:1.25rem;min-width:0}
    .pre-name{font-family:var(--ff-d);font-size:clamp(1rem,1.8vw,1.25rem);font-weight:700;letter-spacing:-.025em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pre-co{font-family:var(--ff-m);font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-light);white-space:nowrap}
    .pre-tags{display:flex;gap:.4rem;flex-wrap:nowrap}
    .pre-tag{font-family:var(--ff-m);font-size:.52rem;letter-spacing:.06em;text-transform:uppercase;padding:.18rem .52rem;border-radius:4px;border:1px solid var(--border);color:var(--text-light);white-space:nowrap}
    .pre-arrow{font-size:.9rem;color:var(--accent);flex-shrink:0;transition:transform .2s}
    .preview-row:hover .pre-arrow{transform:translateX(4px)}

    /* ── Section Divider ── */
    .divider{border:none;border-top:1px solid var(--border);margin:0}

    /* ── Shared Section Layout ── */
    .s-wrap{padding:6rem clamp(1.5rem,5vw,4.5rem);max-width:1280px;margin:0 auto}
    .s-eyebrow{font-family:var(--ff-m);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-txt);margin-bottom:1rem;display:flex;align-items:center;gap:.65rem}
    .s-eyebrow::after{content:'';flex:0 0 30px;height:1.5px;background:var(--accent);opacity:.6}
    .s-title{font-family:var(--ff-d);font-size:clamp(2.2rem,4.5vw,3.8rem);font-weight:700;line-height:1.0;letter-spacing:-.035em;margin-bottom:3rem}
    .s-title .acc{color:var(--accent)}

    /* ── About Section ── */
    .about-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:5rem;align-items:start}
    .about-bio{font-size:1.05rem;line-height:1.85;color:var(--text-mid)}
    .about-bio p+p{margin-top:1.1rem}
    .about-bio strong{color:var(--text);font-weight:500}
    .about-cards{display:flex;flex-direction:column;gap:1rem}
    .a-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:1.4rem 1.5rem;display:flex;align-items:flex-start;gap:1rem;transition:border-color .25s,box-shadow .25s}
    .a-card:hover{border-color:rgba(26,201,122,.4);box-shadow:var(--shadow-sm)}
    .a-card-icon{width:40px;height:40px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.1rem;color:var(--accent-txt)}
    .a-card-icon svg{width:20px;height:20px}
    .a-title{font-family:var(--ff-d);font-size:1rem;font-weight:600;letter-spacing:-.01em;color:var(--text);margin-bottom:.3rem}
    .a-desc{font-size:.82rem;color:var(--text-mid);line-height:1.58}

    /* ── Experience Timeline ── */
    .timeline{position:relative;padding-left:.1rem}
    .timeline::before{content:'';position:absolute;left:0;top:8px;bottom:48px;width:1px;background:linear-gradient(to bottom,var(--accent) 0%,var(--border) 100%)}
    .tl-item{position:relative;padding-left:2.25rem;padding-bottom:3.25rem}
    .tl-dot{position:absolute;left:-5px;top:7px;width:11px;height:11px;border-radius:50%;background:var(--bg);border:2px solid var(--accent);transition:background .22s}
    .tl-item:hover .tl-dot{background:var(--accent)}
    .tl-meta{font-family:var(--ff-m);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-txt);margin-bottom:.5rem}
    .tl-co{font-family:var(--ff-d);font-size:1.65rem;font-weight:700;letter-spacing:-.03em;color:var(--text);line-height:1.05;margin-bottom:.3rem}
    .tl-role{font-size:.88rem;color:var(--text-mid);margin-bottom:1.1rem}
    .tl-list{list-style:none;display:flex;flex-direction:column;gap:.55rem}
    .tl-list li{font-size:.86rem;color:var(--text-mid);line-height:1.67;padding-left:1.15rem;position:relative}
    .tl-list li::before{content:'→';position:absolute;left:0;color:var(--accent);font-size:.75rem;line-height:1.8}
    .tl-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:1rem}
    .tl-tag{font-family:var(--ff-m);font-size:.53rem;letter-spacing:.07em;text-transform:uppercase;padding:.22rem .6rem;border-radius:5px;border:1px solid var(--border);color:var(--text-light)}

    /* ── Projects Section ── */
    .proj-grid-full{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
    .proj-card-full{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;position:relative;overflow:hidden;transition:box-shadow .28s,transform .28s,border-color .28s}
    .proj-card-full::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .32s}
    .proj-card-full:hover::before{transform:scaleX(1)}
    .proj-card-full:hover{box-shadow:var(--shadow-md);transform:translateY(-4px);border-color:rgba(26,201,122,.3)}
    .pcf-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.25rem}
    .pcf-icon{width:44px;height:44px;border-radius:12px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent-txt)}
    .pcf-icon svg{width:22px;height:22px}
    .pcf-num{font-family:var(--ff-m);font-size:.55rem;letter-spacing:.12em;color:var(--text-light);margin-bottom:.5rem}
    .pcf-title{font-family:var(--ff-d);font-size:1.1rem;font-weight:700;letter-spacing:-.025em;color:var(--text);line-height:1.15;margin-bottom:.3rem}
    .pcf-co{font-family:var(--ff-m);font-size:.56rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-light);margin-bottom:.9rem}
    .pcf-desc{font-size:.88rem;color:var(--text-mid);line-height:1.65;margin-bottom:1.5rem}
    .pcf-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;padding-top:1.25rem;border-top:1px solid var(--border)}
    .pcf-badge{display:inline-flex;align-items:center;background:var(--accent-dim);border-radius:6px;padding:.28rem .75rem;font-family:var(--ff-m);font-size:.58rem;font-weight:700;letter-spacing:.06em;color:var(--accent-txt)}
    .pcf-tags{display:flex;gap:.4rem;flex-wrap:wrap}
    .pcf-tag{font-family:var(--ff-m);font-size:.52rem;letter-spacing:.06em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px;border:1px solid var(--border);color:var(--text-light)}
    /* project card image header */
    .pcf-img{margin:-1.5rem -1.5rem 1.25rem;height:148px;overflow:hidden;position:relative;background:var(--bg)}
    .pcf-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .45s ease}
    .proj-card-full:hover .pcf-img img{transform:scale(1.06)}
    .pcf-img-tag{position:absolute;bottom:.65rem;left:.85rem;background:rgba(242,246,243,.9);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:5px;padding:.22rem .62rem;font-family:var(--ff-m);font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid)}

    /* edu emblem */
    .edu-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.1rem}
    .edu-emblem{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--ff-d);font-size:.55rem;font-weight:800;letter-spacing:.04em;text-align:center;line-height:1.15}

    .btn-detail{font-family:var(--ff-m);font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--text);color:#fff;border:none;padding:.65rem 1.4rem;border-radius:6px;display:inline-flex;align-items:center;gap:.45rem;transition:background .22s,transform .22s,box-shadow .22s;flex-shrink:0}
    .btn-detail:hover{background:var(--accent);transform:translateY(-2px);box-shadow:0 4px 18px rgba(26,201,122,.35)}
    .btn-detail:active{transform:translateY(0) scale(.97);box-shadow:none}
    .d-arr{display:inline-block;transition:transform .22s}
    .btn-detail:hover .d-arr{transform:translateX(4px)}

    /* ── Photo Carousel ── */
    #photos{padding:5rem 0;overflow:hidden}
    .photos-header{padding:0 clamp(1.5rem,5vw,4.5rem);max-width:1280px;margin:0 auto 2.5rem;display:flex;align-items:flex-end;justify-content:space-between}
    .carousel-nav{display:flex;gap:.6rem}
    .carousel-btn{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--border-mid);background:var(--bg-card);color:var(--text-mid);display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s,background .2s,transform .2s;flex-shrink:0}
    .carousel-btn:hover{border-color:var(--accent);color:var(--accent-txt);background:var(--accent-dim);transform:scale(1.08)}
    .carousel-btn svg{width:16px;height:16px}
    .carousel-track-wrap{position:relative}
    .carousel-track-wrap::before,.carousel-track-wrap::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2;pointer-events:none}
    .carousel-track-wrap::before{left:0;background:linear-gradient(to right,var(--bg) 0%,transparent 100%)}
    .carousel-track-wrap::after{right:0;background:linear-gradient(to left,var(--bg) 0%,transparent 100%)}
    .carousel-track{display:flex;gap:14px;padding:8px clamp(1.5rem,5vw,4.5rem)}
    .photo-slide{flex-shrink:0;width:320px;border-radius:14px;overflow:hidden;background:var(--bg-card);border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:transform .32s,box-shadow .32s}
    .photo-slide:hover{transform:translateY(-6px) scale(1.015);box-shadow:var(--shadow-md)}
    .photo-slide img{width:100%;height:240px;object-fit:cover;display:block;transition:transform .4s}
    .photo-slide:hover img{transform:scale(1.05)}
    .photo-slide-cap{padding:.7rem 1rem .85rem;font-family:var(--ff-b);font-size:.78rem;color:var(--text-mid);line-height:1.4}
    .carousel-dots{display:flex;justify-content:center;gap:.45rem;margin-top:1.75rem}
    .c-dot{width:6px;height:6px;border-radius:50%;background:var(--border-mid);transition:background .25s,width .25s;border:none}
    .c-dot.active{background:var(--accent);width:20px;border-radius:3px}

/* ── Cursor ── */
function Cursor() {
  const dot=useRef(null),ring=useRef(null),mp=useRef({x:0,y:0}),rp=useRef({x:0,y:0}),raf=useRef(null);
  useEffect(()=>{
    const mv=e=>{mp.current={x:e.clientX,y:e.clientY};if(dot.current){dot.current.style.left=e.clientX+'px';dot.current.style.top=e.clientY+'px';}};
    const loop=()=>{rp.current.x+=(mp.current.x-rp.current.x)*.13;rp.current.y+=(mp.current.y-rp.current.y)*.13;if(ring.current){ring.current.style.left=rp.current.x+'px';ring.current.style.top=rp.current.y+'px';}raf.current=requestAnimationFrame(loop);};
    window.addEventListener('mousemove',mv);raf.current=requestAnimationFrame(loop);
    return()=>{window.removeEventListener('mousemove',mv);cancelAnimationFrame(raf.current);};
  },[]);
  return <><div ref={dot} className="cur-dot"/><div ref={ring} className="cur-ring"/></>;
}

/* ── Reveal hook ── */
function useReveal() {
  useEffect(()=>{
    const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');}),{threshold:.1,rootMargin:'0px 0px -36px 0px'});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);
}

/* ================================================================
   ✏️  PHOTO WALL — Carousel photos (add as many as you like)
   To use a real photo, replace the picsum URL in the img tag
   inside PhotoWall with a local path, e.g. "./photos/team.jpg"
   or just change the seed string to get a different placeholder.
   cap: caption shown on hover.
   ================================================================ */
const PHOTOS = [
  {seed:"life01",w:640,h:440,cap:"Product sprint session"},
  {seed:"life02",w:640,h:440,cap:"Team collaboration"},
  {seed:"life03",w:640,h:440,cap:"Design review"},
  {seed:"life04",w:640,h:440,cap:"Data analysis workshop"},
  {seed:"life05",w:640,h:440,cap:"NIO team outing"},
  {seed:"life06",w:640,h:440,cap:"Product launch"},
  {seed:"life07",w:640,h:440,cap:"Cross-team workshop"},
  {seed:"life08",w:640,h:440,cap:"Conference day"},
];
const SLIDE_W=320, SLIDE_GAP=14, SLIDE_STEP=334;

function PhotoWall() {
  const CLONE=3;
  const N=PHOTOS.length;
  const extended=[...PHOTOS.slice(-CLONE),...PHOTOS,...PHOTOS.slice(0,CLONE)];

  const posRef=useRef(CLONE);
  const busyRef=useRef(false);
  const [dotIdx,setDotIdx]=useState(0);
  const trackRef=useRef(null);
  const autoRef=useRef(null);
  const fnRef=useRef(null);

  const setTrack=(pos,animate)=>{
    if(!trackRef.current) return;
    trackRef.current.style.transition=animate?'transform .52s cubic-bezier(.4,0,.2,1)':'none';
    if(!animate) void trackRef.current.offsetWidth; // force reflow
    trackRef.current.style.transform=`translateX(-${pos*SLIDE_STEP}px)`;
  };

  fnRef.current=(dir)=>{
    if(busyRef.current) return;
    busyRef.current=true;
    const newPos=posRef.current+dir;
    posRef.current=newPos;
    setDotIdx(((newPos-CLONE)%N+N)%N);
    setTrack(newPos,true);
    setTimeout(()=>{
      const cur=posRef.current;
      let fp=cur;
      if(cur>=CLONE+N) fp=CLONE+(cur-CLONE)%N;
      else if(cur<CLONE) fp=CLONE+N+(cur-CLONE);
      if(fp!==cur){ posRef.current=fp; setTrack(fp,false); }
      busyRef.current=false;
    },560);
  };

  const resetAuto=()=>{
    clearInterval(autoRef.current);
    autoRef.current=setInterval(()=>fnRef.current(1),4000);
  };

  useEffect(()=>{
    setTrack(CLONE,false);
    autoRef.current=setInterval(()=>fnRef.current(1),4000);
    return()=>clearInterval(autoRef.current);
  },[]);

  return <>
    <hr className="divider"/>
    <section id="photos">
      <div className="photos-header reveal">
        <div>
          <div className="s-eyebrow">Life at Work</div>
          <h2 className="s-title" style={{marginBottom:0}}>Behind the <span className="acc">scenes</span></h2>
        </div>
        <div className="carousel-nav">
          <button className="carousel-btn" onClick={()=>{fnRef.current(-1);resetAuto();}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button className="carousel-btn" onClick={()=>{fnRef.current(1);resetAuto();}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
      <div className="carousel-track-wrap">
        <div className="carousel-track" ref={trackRef} style={{transform:`translateX(-${CLONE*SLIDE_STEP}px)`,transition:'none'}}>
          {extended.map((p,i)=>(
            <div key={i} className="photo-slide">
              <img src={`https://picsum.photos/seed/${p.seed}/${p.w}/${p.h}`} alt={p.cap}/>
              <div className="photo-slide-cap">{p.cap}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="carousel-dots">
        {PHOTOS.map((_,i)=>(
          <button key={i} className={`c-dot${i===dotIdx?' active':''}`} onClick={()=>{
            if(busyRef.current) return;
            busyRef.current=true;
            posRef.current=CLONE+i; setDotIdx(i); setTrack(CLONE+i,true);
            setTimeout(()=>{busyRef.current=false;},560);
            resetAuto();
          }}/>
        ))}
      </div>
    </section>
  </>;
}

          <div className="detail-section-title"><IcoTarget/>Overview</div>
          <p className="detail-para">{d.overview}</p>
        </div>

        {/* Background */}
        <div className="detail-section">
          <div className="detail-section-title"><IcoFlag/>Background & Problem</div>
          {d.background.map((p,i)=><p className="detail-para" key={i}>{p}</p>)}
        </div>

        {/* My Role */}
        <div className="detail-section">
          <div className="detail-section-title"><IcoStar/>My Role</div>
          <p className="detail-para">{d.myRole}</p>
        </div>

        {/* Process */}
        <div className="detail-section">
          <div className="detail-section-title"><IcoCog/>Approach</div>
          <div className="process-steps">
            {d.process.map((p,i)=>(
              <div className="ps" key={i}>
                <div className="ps-step">Step {p.step}</div>
                <div className="ps-title">{p.title}</div>
                <div className="ps-desc">{p.desc}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Features */}
        <div className="detail-section">
          <div className="detail-section-title"><IcoZap/>Key Features</div>
          <div className="feat-grid">
            {d.features.map((f,i)=>(
              <div className="feat-card" key={i}>
                <div className="feat-title">{f.title}</div>
                <div className="feat-desc">{f.desc}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Images */}
        <div className="detail-section">
          <div className="detail-section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Screenshots & Design
          </div>
          <div className={`img-gallery${d.images.length===2?' two':''}`}>
            {d.images.map((img,i)=>(
              <div key={i}>
                <div className="gallery-img"><img src={img.src} alt={img.cap}/></div>
                <div className="gallery-cap">{img.cap}</div>
              </div>
            ))}
          </div>
        </div>

        {/* PRD */}
        <div className="detail-section">
          <div className="detail-section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            PRD Excerpt
          </div>
          <div className="prd-box">
            <div className="prd-feature">Feature: {d.prd.feature}</div>
            <div className="prd-block">
              <div className="prd-block-title">User Stories</div>
              {d.prd.stories.map((s,i)=>(
                <div className="us-row" key={i}>As a <span>{s.as}</span>, I want to {s.want}, so that {s.so}.</div>
              ))}
            </div>
            <div className="prd-block">
              <div className="prd-block-title">Acceptance Criteria</div>
              <ul className="ac-list">{d.prd.criteria.map((c,i)=><li key={i}>{c}</li>)}</ul>
            </div>
            <div className="prd-meta">
              <div className="prd-meta-item"><span className="prd-meta-label">Priority</span><span className="prd-meta-val">{d.prd.priority}</span></div>
              <div className="prd-meta-item"><span className="prd-meta-label">Effort Estimate</span><span className="prd-meta-val">{d.prd.effort}</span></div>
            </div>
          </div>
        </div>

        {/* Impact */}
        <div className="detail-section">
          <div className="detail-section-title"><IcoTrend/>Impact & Results</div>
          <div className="impact-grid">
            {d.impact.map((m,i)=>(
              <div className="impact-card" key={i}>
                <div className="impact-val">{m.v}</div>
                <div className="impact-lbl">{m.l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Tech */}
        <div className="detail-section">
          <div className="detail-section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Tools & Technology
          </div>
          <div className="tech-tags">{d.tech.map(t=><span className="tech-tag" key={t}>{t}</span>)}</div>
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   ⚙️  MODULE 3 · APP ROOT  (routing + render — no edit needed)
   ================================================================ */
function App() {
  const [active,setActive]=useState('hero');
  const [detailId,setDetailId]=useState(null);
  useReveal();

  useEffect(()=>{
    const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)setActive(e.target.id);}),{threshold:.2});
    ['about','experience','projects','skills','contact'].forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[]);

  const scrollPosRef=useRef(0);
  const openDetail=id=>{scrollPosRef.current=window.scrollY;setDetailId(id);window.scrollTo(0,0);};
  const closeDetail=()=>{setDetailId(null);requestAnimationFrame(()=>window.scrollTo(0,scrollPosRef.current));};

  return <>
    <div className="noise"/><Cursor/><Nav active={active}/>
    <main>
      <Hero/>
      <About/>
      <Experience/>
      <ProjectsFull onDetail={openDetail}/>
      {/* <PhotoWall/> */}{/* ✏️ Life at Work 暂时隐藏，取消注释即可恢复 */}
      <Skills/>
      <Contact/>
    </main>
    {/* ✏️ Footer — update year, name, title */}
    <footer><span>© 2026 Xinyi Kong</span><span>AI Product Manager · Singapore</span></footer>
    {detailId && <ProjectDetail id={detailId} onClose={closeDetail}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
